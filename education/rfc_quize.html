<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to RFC Quizzes | ToppyMicroServices</title>
  <meta name="robots" content="noindex" />
  <meta http-equiv="refresh" content="0; url=rfc_quizzes.html" />
  <link rel="canonical" href="https://toppymicros.com/education/rfc_quizzes.html" />
  <style>
    :root {
      color-scheme: dark;
      --fg: #e5eef8;
      --muted: #9eb0c6;
      --accent: #7dd3fc;
      --panel: rgba(15, 23, 42, 0.92);
      --border: rgba(148, 163, 184, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font: 16px/1.6 Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(125, 211, 252, 0.12), transparent 40%),
        linear-gradient(180deg, #111827 0%, #0b1221 100%);
      color: var(--fg);
    }
    main {
      width: min(640px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }
    h1 { margin: 0 0 10px; font-size: clamp(1.8rem, 4vw, 2.4rem); }
    p { margin: 0 0 14px; color: var(--muted); }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Redirecting to RFC Quizzes</h1>
    <p>This page has moved to the canonical RFC quizzes page.</p>
    <p><a id="targetLink" href="rfc_quizzes.html">Open the new RFC quizzes page</a></p>
  </main>
  <script>
    (function () {
      var target = 'rfc_quizzes.html' + window.location.search + window.location.hash;
      var link = document.getElementById('targetLink');
      if (link) link.href = target;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
